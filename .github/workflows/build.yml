name: Build Multi-Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: 'Linux AVX2'
            avx2: true
            bun_baseline: false
            artifact_name: 'claude-linux-avx2'
          - os: ubuntu-latest
            name: 'Linux No AVX2 (Compatible)'
            avx2: false
            bun_baseline: true
            artifact_name: 'claude-linux-no-avx2'
          - os: windows-latest
            name: 'Windows AVX2'
            avx2: true
            bun_baseline: false
            artifact_name: 'claude-windows-avx2.exe'
          - os: windows-latest
            name: 'Windows No AVX2 (Compatible)'
            avx2: false
            bun_baseline: true
            artifact_name: 'claude-windows-no-avx2.exe'
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Bun Baseline (Linux No AVX2)
        if: matrix.bun_baseline == true && runner.os == 'Linux'
        run: |
          # Install baseline version of Bun for better compatibility
          curl -fsSL https://bun.sh/install | bash -s "bun-v$(bun --version)"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          $HOME/.bun/bin/bun --version

      - name: Setup Bun Baseline (Windows No AVX2)
        if: matrix.bun_baseline == true && runner.os == 'Windows'
        run: |
          # Install baseline version of Bun for better compatibility
          powershell -c "irm bun.sh/install.ps1|iex"
        shell: bash

      - name: Verify Bun version
        run: bun --version

      - name: Install dependencies
        run: bun install

      - name: Build (AVX2)
        if: matrix.avx2 == true
        run: bun run ./scripts/build.ts --compile

      - name: Build (No AVX2 - Compatible)
        if: matrix.avx2 == false
        run: bun run ./scripts/build.ts --compile --no-avx2

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          if [ -f dist/cli ]; then
            cp dist/cli artifacts/${{ matrix.artifact_name }}
          elif [ -f cli ]; then
            cp cli artifacts/${{ matrix.artifact_name }}
          fi
          ls -la artifacts/

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p artifacts
          if (Test-Path dist/cli.exe) {
            Copy-Item dist/cli.exe artifacts/${{ matrix.artifact_name }}
          } elseif (Test-Path cli.exe) {
            Copy-Item cli.exe artifacts/${{ matrix.artifact_name }}
          }
          Get-ChildItem artifacts/
        shell: pwsh

      - name: Compress artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          cd artifacts
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}
          rm ${{ matrix.artifact_name }}
          ls -la

      - name: Compress artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          cd artifacts
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ${{ matrix.artifact_name }}.zip
          Remove-Item ${{ matrix.artifact_name }}
          Get-ChildItem
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: >-
      github.event_name == 'release' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          ls -la artifacts/

      - name: Create Release (on tag)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly Build
          files: |
            artifacts/*
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
