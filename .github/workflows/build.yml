name: Build Multi-Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.avx2 == true && 'AVX2' || 'No AVX2' }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            avx2: true
          - os: ubuntu-latest
            avx2: false
          - os: windows-latest
            avx2: true
          - os: windows-latest
            avx2: false
            bun_version: 'baseline'
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun (AVX2)
        if: matrix.bun_version != 'baseline'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Bun (Baseline - No AVX2)
        if: matrix.bun_version == 'baseline'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          baseline: true

      - name: Install dependencies
        run: bun install

      - name: Build (AVX2)
        if: matrix.avx2 == true
        run: bun run ./scripts/build.ts --compile

      - name: Build (No AVX2 - Compatible)
        if: matrix.avx2 == false
        run: bun run ./scripts/build.ts --compile --no-avx2

      - name: Rename artifacts (Linux AVX2)
        if: matrix.os == 'ubuntu-latest' && matrix.avx2 == true
        run: |
          mkdir -p artifacts
          if [ -f cli ]; then
            cp cli artifacts/claude-linux-avx2
          fi

      - name: Rename artifacts (Linux No AVX2)
        if: matrix.os == 'ubuntu-latest' && matrix.avx2 == false
        run: |
          mkdir -p artifacts
          if [ -f cli ]; then
            cp cli artifacts/claude-linux-no-avx2
          fi

      - name: Rename artifacts (Windows AVX2)
        if: matrix.os == 'windows-latest' && matrix.avx2 == true
        run: |
          mkdir -p artifacts
          if (Test-Path cli.exe) {
            Copy-Item cli.exe artifacts/claude-windows-avx2.exe
          }
        shell: pwsh

      - name: Rename artifacts (Windows No AVX2)
        if: matrix.os == 'windows-latest' && matrix.avx2 == false
        run: |
          mkdir -p artifacts
          if (Test-Path cli.exe) {
            Copy-Item cli.exe artifacts/claude-windows-no-avx2.exe
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}-${{ matrix.avx2 == true && 'avx2' || 'no-avx2' }}
          path: artifacts/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: >-
      github.event_name == 'release' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release (on tag)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly Build
          files: |
            artifacts/**/*
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
