name: Build CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (leave empty for package.json version)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  BUN_VERSION: '1.3.11'

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.baseline && 'Baseline' || 'AVX2' }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            baseline: false
            artifact_name: claude-windows-x64
            output_file: dist/cli.exe
          - platform: linux-x64
            runner: ubuntu-latest
            baseline: false
            artifact_name: claude-linux-x64
            output_file: dist/cli
          - platform: windows-x64-baseline
            runner: windows-latest
            baseline: true
            artifact_name: claude-windows-x64-baseline
            output_file: dist/cli.exe
          - platform: linux-x64-baseline
            runner: ubuntu-latest
            baseline: true
            artifact_name: claude-linux-x64-baseline
            output_file: dist/cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun (standard)
        if: matrix.baseline == false
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Bun (baseline)
        if: matrix.baseline == true
        uses: oven-sh/setup-bun@v2
        with:
          bun-download-url: ${{ matrix.platform == 'windows-x64-baseline' && 'https://github.com/oven-sh/bun/releases/download/bun-v1.3.11/bun-windows-x64-baseline.zip' || 'https://github.com/oven-sh/bun/releases/download/bun-v1.3.11/bun-linux-x64-baseline.zip' }}

      - name: Verify Bun
        shell: bash
        run: |
          bun --version
          bun --revision

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Compile
        shell: bash
        run: bun run compile

      - name: Prepare artifact
        id: prepare
        shell: bash
        run: |
          mkdir -p artifact
          if [ "${{ matrix.platform }}" = "windows-x64" ] || [ "${{ matrix.platform }}" = "windows-x64-baseline" ]; then
            cp "${{ matrix.output_file }}" "artifact/${{ matrix.artifact_name }}.exe"
          else
            cp "${{ matrix.output_file }}" "artifact/${{ matrix.artifact_name }}"
          fi
          chmod +x "artifact/${{ matrix.artifact_name }}"* 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            # Find the actual binary file
            for file in "$dir"*; do
              if [ -f "$file" ] && [[ ! "$file" =~ \.txt$ ]]; then
                filename=$(basename "$file")
                zip "release/${filename}.zip" "$file"
                break
              fi
            done
          done
          echo "Packaged files:"
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
